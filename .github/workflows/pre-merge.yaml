name: Run Pre Merge Actions

on:
  pull_request:
    branches: ['main']

  workflow_dispatch:

jobs:
  pre-merge:
    runs-on: ubuntu-latest

    steps:
      - name: Display branch name
        run: echo "The current branch name is ${{ github.head_ref || github.ref_name }}"

      - name: Checkout
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.13.0
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Formatting
        run: pnpm check-format

      - name: Run lint
        run: pnpm run lint

      - name: Run tests
        run: pnpm run test
